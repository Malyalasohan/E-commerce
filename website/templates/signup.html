<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/signup.css') }}">
    
</head>
<body>

    <!-- Login Form -->
<div class="container" id="loginContainer">
    <h2>Login</h2>
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" name="loginUsername" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password" required>
        </div>
        <button type="submit">Login</button>
        <p class="switch" onclick="showSignup()">Don't have an account? Sign up</p>
    </form>
    

    <!-- Signup Form -->
    <div class="container" id="signupContainer">
        <h2>Sign Up</h2>
        <form action="/signup" method="POST">
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" name="signupUsername" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" name="signupPassword" placeholder="Create a password" required>
            </div>
            <button type="submit">Sign Up</button>
            <p class="switch" onclick="showLogin()">Already have an account? Log in</p>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script/signup.js')}}"></script>
</body>
</html>
